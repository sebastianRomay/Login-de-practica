<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>Login estilo MSN</title>
</head>

<body>
    <div class="container-login">
        <img class="avatar" src="img/logo.jpg" alt="Logo tiburon">
        <h1>Entrar en W Live Messenger</h1>
        <form>
            <label for="email"></label>
            <input type="email" name="email" placeholder="Example123@hotmail.com">
            <label for="password"></label>
            <input type="password" name="password" placeholder="Introduce tu contraseña">
            <input type="submit" value="Entrar">
            <!-- <input type="button" value="Registrarse"> -->
            <a href="#">¿Olvidaste tu contraseña?</a>
            <p>¿No tienes una cuenta? <span><a href="#">Registrate</a></span></p>
        </form>
    </div>
</body>

</html>
